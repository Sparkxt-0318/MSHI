# MSHI-Geo configuration (v2: soil respiration target)

paths:
  raw: data/raw
  processed: data/processed
  outputs: data/outputs
  model: data/outputs/mshi_geo_xgb.json
  feature_table_train: data/processed/training_features.parquet
  feature_table_us: data/processed/us_validation_features.parquet
  asia_grid_5km: data/processed/asia_grid_5km.parquet
  asia_grid_1km: data/processed/asia_grid_1km.parquet
  prediction_5km: data/outputs/mshi_geo_asia_5km.tif
  prediction_1km: data/outputs/mshi_geo_asia_1km.tif
  shap_summary: data/outputs/shap_summary.png
  validation_report: data/outputs/validation_report.json
  hero_map_png: data/outputs/hero_mshi_geo_asia.png
  hero_map_pdf: data/outputs/hero_mshi_geo_asia.pdf

regions:
  asia:
    bounds: [25.0, -10.0, 180.0, 80.0]
    name: "Asia"
  us_validation:
    bounds: [-125.0, 24.0, -66.0, 50.0]
    name: "CONUS"

grid:
  iteration_deg: 0.05      # ~5 km
  final_deg: 0.01          # ~1 km

features:
  soilgrids:
    [soc, nitrogen, phh2o, clay, sand, silt, bdod, cec]
  worldclim:
    [bio01, bio04, bio05, bio06, bio12, bio14, bio15, bio17]
  modis:
    [npp, lst_day, lst_night, landcover]

# Modeling — TARGET: log annual soil respiration (g C m-2 yr-1)
model:
  algorithm: xgboost
  target: log_rs_annual
  test_size: 0.20
  random_state: 42
  spatial_cv:
    enabled: true
    n_splits: 5
    block_size_deg: 5.0
  xgboost_params:
    n_estimators: 800
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.85
    colsample_bytree: 0.85
    min_child_weight: 4
    reg_alpha: 0.1
    reg_lambda: 1.0
    objective: "reg:squarederror"
    early_stopping_rounds: 50

# Climate-only baseline used to compute climate-expected Rs (for the anomaly composite)
climate_baseline:
  features: [bio01, bio04, bio12, bio14, bio15]
  xgboost_params:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.85
    objective: "reg:squarederror"

# MSHI-Geo composite (anomaly): predicted Rs / climate-expected Rs
composite:
  type: anomaly_ratio
  output_column: mshi_geo_anomaly
  vmin: 0.5
  vmax: 1.5

seed: 42
